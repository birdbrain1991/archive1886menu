<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive 1886</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0e0a}
canvas#bg{position:fixed;inset:0;z-index:0}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:15;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;z-index:20;background:rgba(10,9,14,0.88);border-right:1px solid rgba(200,168,110,0.18);display:flex;flex-direction:column;backdrop-filter:blur(4px);}
#back{display:block;font-family:"IM Fell English",serif;font-size:11px;letter-spacing:3px;color:rgba(200,168,110,0.5);padding:18px 18px 14px;text-decoration:none;border-bottom:1px solid rgba(200,168,110,0.12);transition:color 0.3s;}
#back:hover{color:#c8a86e}
#sidebar h2{font-family:"IM Fell English",serif;font-size:10px;letter-spacing:4px;color:rgba(200,168,110,0.35);padding:14px 18px 10px;text-transform:uppercase;}
#story-list{flex:1;overflow-y:auto;padding:4px 0;}
.story-btn{display:block;width:100%;padding:11px 18px;background:none;border:none;border-left:3px solid transparent;color:rgba(200,168,110,0.5);font-family:"IM Fell English",serif;font-size:13px;text-align:left;cursor:pointer;transition:all 0.25s;}
.story-btn:hover{background:rgba(200,168,110,0.06);color:#c8a86e;}
.story-btn.active{border-left-color:#c8a86e;color:#c8a86e;background:rgba(200,168,110,0.08);}
#viewer{position:fixed;left:220px;top:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;justify-content:center;}
#placeholder{font-family:"IM Fell English",serif;font-size:12px;letter-spacing:4px;color:rgba(200,168,110,0.25);text-align:center;}
#pdf-frame{width:100%;height:100%;border:none;display:none;}
#loader{position:fixed;inset:0;background:#0d0e0a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;}
#loader.hidden{opacity:0;pointer-events:none;}
.loader-text{font-family:"IM Fell English",serif;font-size:11px;letter-spacing:5px;color:rgba(200,168,110,0.6);animation:lpulse 1.4s ease-in-out infinite;}
.loader-bar{width:160px;height:1px;background:rgba(200,168,110,0.15);margin-top:18px;position:relative;overflow:hidden;}
.loader-bar::after{content:'';position:absolute;left:-60%;top:0;width:60%;height:100%;background:#c8a86e;animation:lslide 1.2s ease-in-out infinite;}
@keyframes lpulse{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes lslide{0%{left:-60%}100%{left:110%}}
</style>
</head>
<body>
<div id="loader"><div class="loader-text">LOADING</div><div class="loader-bar"></div></div>
<canvas id="bg"></canvas>
<div id="scanlines"></div>
<div id="sidebar">
  <a id="back" href="https://birdbrain1991.github.io/1886menu/" target="_top">&#8592; back</a>
  <h2>Archive</h2>
  <div id="story-list"></div>
</div>
<div id="viewer">
  <iframe id="pdf-frame"></iframe>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var _hl = function() {
  var l = document.getElementById('loader');
  if (!l || l._gone) return;
  l._gone = true; l.classList.add('hidden');
  setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 900);
};
setTimeout(_hl, 3500);
window.addEventListener('pageshow', function() {
  document.fonts.ready.then(function() {
    requestAnimationFrame(function() { requestAnimationFrame(function() { _hl(); }); });
  });
  window.addEventListener('load', function() { setTimeout(_hl, 300); }, { once: true });
});

var BASE = 'https://birdbrain1991.github.io/archive1886/';
var STORIES = ['Story1.pdf'];
var list = document.getElementById('story-list');
var frame = document.getElementById('pdf-frame');
var ph = document.getElementById('placeholder');
STORIES.forEach(function(name, i) {
  var btn = document.createElement('button');
  btn.className = 'story-btn';
  var title = name.replace(/^Story\d+-/, '').replace('.pdf', '').replace(/_/g, ' ');
  btn.textContent = title;
  btn.onclick = function() {
    document.querySelectorAll('.story-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    window.open(BASE + name, '_blank');
  };
  list.appendChild(btn);
});

try {
  var cvs = document.getElementById('bg');
  var rdr = new THREE.WebGLRenderer({ canvas: cvs, antialias: false });
  rdr.setPixelRatio(1);
  rdr.setSize(window.innerWidth, window.innerHeight);
  rdr.toneMapping = THREE.ACESFilmicToneMapping;
  rdr.toneMappingExposure = 0.9;

  var sc = new THREE.Scene();
  sc.background = new THREE.Color(0x0d0e0a);
  sc.fog = new THREE.FogExp2(0x0d0e0a, 0.010);

  var cam = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.5, 400);
  cam.position.set(-8, 55, 25);
  cam.lookAt(-8, 0, 3);

  window.addEventListener('resize', function() {
    cam.aspect = window.innerWidth / window.innerHeight;
    cam.updateProjectionMatrix();
    rdr.setSize(window.innerWidth, window.innerHeight);
  });

  sc.add(new THREE.AmbientLight(0x2a2418, 2.0));
  var moon = new THREE.DirectionalLight(0xd8c8a0, 1.6);
  moon.position.set(-25, 50, 20);
  sc.add(moon);
  var fill = new THREE.DirectionalLight(0x181828, 0.4);
  fill.position.set(20, 15, -10);
  sc.add(fill);

  // Ground
  var grd = new THREE.Mesh(new THREE.PlaneGeometry(220, 220), new THREE.MeshLambertMaterial({ color: 0x100e08 }));
  grd.rotation.x = -Math.PI / 2;
  sc.add(grd);

  function makeDistrict(pts, h, col, em) {
    var shape = new THREE.Shape();
    shape.moveTo(pts[0][0], pts[0][1]);
    for (var i = 1; i < pts.length; i++) shape.lineTo(pts[i][0], pts[i][1]);
    shape.closePath();
    var geo = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: true, bevelThickness: 0.12, bevelSize: 0.1, bevelSegments: 2 });
    var mat = new THREE.MeshLambertMaterial({ color: col, emissive: em || 0x000000 });
    var mesh = new THREE.Mesh(geo, mat);
    var pivot = new THREE.Object3D();
    pivot.rotation.x = -Math.PI / 2;
    pivot.position.y = 0.05;
    pivot.add(mesh);
    sc.add(pivot);
    // Top edge glow
    var ep = pts.map(function(p) { return new THREE.Vector3(p[0], h + 0.22, -p[1]); });
    ep.push(ep[0].clone());
    var eg = new THREE.BufferGeometry().setFromPoints(ep);
    sc.add(new THREE.Line(eg, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.5 })));
  }


  // ── DISTRICTS — traced from image reference ──

  // Leopoldstadt (II) — large yellow district, diagonal strip NE
  makeDistrict([[-16.0, 17.1],[-7.8, 1.7],[-1.3, 3.7],[20.3,-16.4],[23.6,-11.2],[-6.3, 24.7]], 2.0, 0x2e3828, 0x0a1410);

  // Alsergrund (IX) — green, NW
  makeDistrict([[-16.6, 14.6],[-18.9, 12.1],[-17.8, 8.8],[-21.2, 6.6],[-20.1, 3.6],[-12.2, 5.6]], 1.8, 0x2e2a1e, 0x0a0806);

  // Innere Stadt (I) — blue, center
  makeDistrict([[-10.9, 4.6],[-16.0, 2.7],[-15.9,-1.1],[-12.3,-4.7],[-11.0,-3.3],[-9.5,-4.2],[-6.2, 0.6],[-10.0, 0.8]], 4.5, 0x6e5a3c, 0x1a1006);

  // Landstrasse (III) — purple, large SE
  makeDistrict([[-6.7, 25.6],[-16.6, 17.3],[-8.1, 1.1],[-16.3,-1.2],[-9.5,-4.9],[20.3,-17.5],[24.4,-11.4]], 2.1, 0x3e3018, 0x100c04);

  // Wieden (IV) — red, south
  makeDistrict([[-22.9,-15.3],[-18.4,-21.7],[-14.8,-16.7],[-8.1,-20.3],[-8.7,-23.1],[-5.0,-25.1],[-2.0,-21.6],[-9.5,-6.6],[-12.7,-6.3]], 2.0, 0x5a3020, 0x140a06);

  // Josefstadt (VIII) — brown, small NW
  makeDistrict([[-22.8, 3.1],[-22.7,-0.5],[-17.2,-1.1],[-17.4, 2.6]], 1.9, 0x342c1e, 0x0c0a06);

  // Mariahilf (VI) — pink, small W
  makeDistrict([[-23.3,-2.0],[-21.9,-6.7],[-15.3,-3.8],[-16.6,-2.6]], 1.9, 0x4a3828, 0x120e08);

  // Neubau (VII) — orange, W strip
  makeDistrict([[-14.1,-5.2],[-23.5,-9.2],[-22.2,-10.9],[-17.8,-9.9],[-18.2,-7.8]], 2.0, 0x3a3020, 0x0e0c08);

  // ── STREET OVERLAY — live editable ──
  var streetPlane = null;
  var streetMat = null;
  window.overlayParams = { x: -1.3, y: 2.35, z: 0.2, w: 53, h: 53.5, rot: 0, opacity: 0.5 };

  new THREE.TextureLoader().load('https://birdbrain1991.github.io/archive1886menu/1000027578.jpg', function(tex) {
    streetMat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true,
      opacity: window.overlayParams.opacity,
      blending: THREE.MultiplyBlending,
      depthWrite: false
    });
    streetPlane = new THREE.Mesh(new THREE.PlaneGeometry(window.overlayParams.w, window.overlayParams.h), streetMat);
    streetPlane.rotation.x = -Math.PI / 2;
    streetPlane.rotation.z = 0;
    streetPlane.position.set(window.overlayParams.x, window.overlayParams.y, window.overlayParams.z);
    sc.add(streetPlane);
  });

  window.updateStreetPlane = function() {
    if (!streetPlane) return;
    streetPlane.position.set(window.overlayParams.x, window.overlayParams.y, window.overlayParams.z);
    streetPlane.rotation.z = window.overlayParams.rot * Math.PI / 180;
    streetMat.opacity = window.overlayParams.opacity;
    streetPlane.geometry.dispose();
    streetPlane.geometry = new THREE.PlaneGeometry(window.overlayParams.w, window.overlayParams.h);
  }

  // ── STEPHANSDOM — Innere Stadt center (0.7,-7.4) ──
  var cathG = new THREE.Group();
  cathG.position.set(-11.5, 4.7, 0.7);

  // Nave
  var nave = new THREE.Mesh(new THREE.BoxGeometry(1.6,1.0,0.55),
    new THREE.MeshLambertMaterial({color:0x5a4a32,emissive:0x0c0a06}));
  nave.position.y = 0.5;
  cathG.add(nave);

  // Transept
  var trans = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.9,1.2),
    new THREE.MeshLambertMaterial({color:0x5a4a32,emissive:0x0c0a06}));
  trans.position.set(-0.25,0.45,0);
  cathG.add(trans);

  // South tower (tall)
  var st = new THREE.Mesh(new THREE.BoxGeometry(0.24,3.4,0.24),
    new THREE.MeshLambertMaterial({color:0x6e5a3c,emissive:0x100c04}));
  st.position.set(-0.68,1.7,0.15);
  cathG.add(st);
  var stSpire = new THREE.Mesh(new THREE.ConeGeometry(0.15,1.6,4),
    new THREE.MeshLambertMaterial({color:0x7a4e2a}));
  stSpire.position.set(-0.68,3.4+0.8,0.15);
  cathG.add(stSpire);

  // North tower (shorter, unfinished)
  var nt = new THREE.Mesh(new THREE.BoxGeometry(0.22,2.0,0.22),
    new THREE.MeshLambertMaterial({color:0x6e5a3c,emissive:0x100c04}));
  nt.position.set(-0.68,1.0,-0.15);
  cathG.add(nt);
  var ntCap = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.1,0.28),
    new THREE.MeshLambertMaterial({color:0x8a7040}));
  ntCap.position.set(-0.68,2.05,-0.15);
  cathG.add(ntCap);

  // Steep roof
  var rvShape = new THREE.Shape();
  rvShape.moveTo(-0.8,-0.28); rvShape.lineTo(0.8,-0.28);
  rvShape.lineTo(0.8,0.28); rvShape.lineTo(-0.8,0.28); rvShape.closePath();
  var rvGeo = new THREE.ExtrudeGeometry(rvShape,{depth:0.5,bevelEnabled:false});
  var rvMesh = new THREE.Mesh(rvGeo,
    new THREE.MeshLambertMaterial({color:0x2e3828,emissive:0x0a1410,side:THREE.DoubleSide}));
  var rvPivot = new THREE.Object3D();
  rvPivot.rotation.x = -Math.PI/2;
  rvPivot.position.set(0,1.05,0.25);
  rvPivot.add(rvMesh);
  cathG.add(rvPivot);

  // Warm glow
  var cathGlow = new THREE.PointLight(0xd4a040,1.0,3.0);
  cathGlow.position.set(0,0.8,0);
  cathG.add(cathGlow);

  sc.add(cathG);




  // ── MAP TITLE LABEL ──
  (function() {
    var canvas = document.createElement('canvas');
    canvas.width = 2048; canvas.height = 512;
    var ctx = canvas.getContext('2d');

    // Black background
    ctx.fillStyle = 'rgba(8,7,5,0.92)';
    ctx.fillRect(0, 0, 2048, 512);

    // Outer border
    ctx.strokeStyle = 'rgba(200,168,110,0.7)';
    ctx.lineWidth = 6;
    ctx.strokeRect(12, 12, 2024, 488);

    // Inner border
    ctx.strokeStyle = 'rgba(200,168,110,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(24, 24, 2000, 464);

    // Decorative line top
    ctx.strokeStyle = 'rgba(200,168,110,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(80,90); ctx.lineTo(1968,90); ctx.stroke();

    // Main title
    ctx.fillStyle = 'rgba(220,185,120,0.95)';
    ctx.font = 'italic 148px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Vienna, Austria', 1024, 210);

    // Year
    ctx.font = '118px Georgia, serif';
    ctx.fillStyle = 'rgba(220,185,120,0.95)';
    ctx.fillText('1886', 1024, 320);

    // Decorative line bottom
    ctx.strokeStyle = 'rgba(200,168,110,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(80,370); ctx.lineTo(1968,370); ctx.stroke();

    // Subtitle — italic, smaller
    ctx.font = 'italic 94px Georgia, serif';
    ctx.fillStyle = 'rgba(220,185,120,0.95)';
    ctx.fillText('well, kinda ... similar-ish', 1024, 455);

    var tex = new THREE.CanvasTexture(canvas);
    var mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false,
      side: THREE.DoubleSide
    });
    var mesh = new THREE.Mesh(new THREE.PlaneGeometry(17, 6), mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(-11.5, 5.5, 7.5);
    sc.add(mesh);
  })();

  // Stars
  var sGeo = new THREE.BufferGeometry();
  var sPos = [];
  for (var i = 0; i < 280; i++) sPos.push((Math.random()-.5)*300, 30+Math.random()*60, (Math.random()-.5)*300);
  sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
  sc.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xc8c0b0, size: 0.28, transparent: true, opacity: 0.55 })));

  // ── ZEPPELINS ──
  function makeZeppelin(sx, sy, sz, speed, bobFreq, bobAmp) {
    var g = new THREE.Group();
    // Hull
    var h = new THREE.Mesh(new THREE.SphereGeometry(1,16,8),
      new THREE.MeshLambertMaterial({color:0x8a7848, emissive:0x1a1408}));
    h.scale.set(4.5, 1, 1);
    g.add(h);
    // Tail fins
    var finMat = new THREE.MeshLambertMaterial({color:0x6a5c38, emissive:0x0e0c06});
    var finShape = new THREE.Shape();
    finShape.moveTo(0,0); finShape.lineTo(-1.5,0); finShape.lineTo(-1.2,0.8); finShape.closePath();
    var finGeo = new THREE.ShapeGeometry(finShape);
    var finTop = new THREE.Mesh(finGeo, finMat);
    finTop.position.set(-3.8, 0.9, 0); g.add(finTop);
    var finBot = new THREE.Mesh(finGeo, finMat);
    finBot.position.set(-3.8, -0.9, 0); finBot.scale.y = -1; g.add(finBot);
    var finR = new THREE.Mesh(finGeo, finMat);
    finR.position.set(-3.8, 0, 0.9); finR.rotation.y = Math.PI/2; g.add(finR);
    // Gondola
    var gond = new THREE.Mesh(new THREE.BoxGeometry(2.4,0.55,0.65),
      new THREE.MeshLambertMaterial({color:0x2e2214, emissive:0x080604}));
    gond.position.y = -1.15;
    g.add(gond);
    // Gondola windows
    var winMat = new THREE.MeshBasicMaterial({color:0xd4a840});
    for (var wi = -0.7; wi <= 0.7; wi += 0.35) {
      var win = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.66), winMat);
      win.position.set(wi, -1.05, 0); g.add(win);
    }
    // Rope lines (gondola to hull)
    var ropeMat = new THREE.LineBasicMaterial({color:0x5a4a28, transparent:true, opacity:0.6});
    [[-0.8,0.8],[0,0.8],[0.8,0.8]].forEach(function(rx) {
      var rpts = [new THREE.Vector3(rx[0],-0.95,0), new THREE.Vector3(rx[0],-1.12,0)];
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(rpts), ropeMat));
    });
    g.position.set(sx, sy, sz);
    g.userData = {speed: speed, bobFreq: bobFreq, bobAmp: bobAmp, baseY: sy};
    sc.add(g);
    return g;
  }

  // Three zeppelins at different heights, speeds, paths
  var zep1 = makeZeppelin(-35, 18, 2,   1.2, 0.22, 0.8);
  var zep2 = makeZeppelin(-20, 22, 8,   0.7, 0.17, 1.1);
  var zep3 = makeZeppelin(  5, 20, -5,  0.9, 0.28, 0.6);

  // ── CLOUDS ──
  function makeCloud(cx, cy, cz, scale) {
    var g = new THREE.Group();
    var cMat = new THREE.MeshLambertMaterial({
      color: 0xc8c0b0, transparent: true, opacity: 0.18, depthWrite: false
    });
    // Cluster of overlapping spheres
    var blobs = [
      [0,0,0,1.0], [1.4,0.3,0.2,0.8], [-1.3,0.2,-0.1,0.75],
      [0.5,0.7,0.5,0.7], [-0.4,0.6,-0.4,0.65], [0.9,-0.1,0.8,0.6]
    ];
    blobs.forEach(function(b) {
      var blob = new THREE.Mesh(new THREE.SphereGeometry(b[3]*scale, 8, 6), cMat.clone());
      blob.position.set(b[0]*scale, b[1]*scale, b[2]*scale);
      g.add(blob);
    });
    g.position.set(cx, cy, cz);
    g.userData = {baseY: cy, drift: (Math.random()-0.5)*0.04};
    sc.add(g);
    return g;
  }

  var cloud1 = makeCloud(-12, 24, 0,   4.5);
  var cloud2 = makeCloud(  5, 27, 6,   3.8);
  var cloud3 = makeCloud( -8, 25, -8,  5.0);

  var clk = new THREE.Clock();
  rdr.setAnimationLoop(function() {
    var dt = clk.getDelta();
    var t = clk.getElapsedTime();

    // Animate zeppelins
    [zep1, zep2, zep3].forEach(function(z) {
      z.position.x += z.userData.speed * dt;
      if (z.position.x > 60) z.position.x = -60;
      z.position.y = z.userData.baseY + Math.sin(t * z.userData.bobFreq) * z.userData.bobAmp;
    });

    // Drift clouds slowly
    [cloud1, cloud2, cloud3].forEach(function(c) {
      c.position.x += c.userData.drift * dt;
      c.position.y = c.userData.baseY + Math.sin(t * 0.08) * 0.4;
      if (c.position.x > 40) c.position.x = -40;
      if (c.position.x < -40) c.position.x = 40;
    });

    rdr.render(sc, cam);
  });

} catch(e) { console.error('BG:', e); }
</script>



</body>
</html>
