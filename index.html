<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive 1886</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; color: #ccc; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar {
  width: 220px;
  flex-shrink: 0;
  background: #1a1a1a;
  border-right: 1px solid #333;
  padding: 20px 0;
  overflow-y: auto;
}
#sidebar h2 {
  font-size: 11px;
  letter-spacing: 3px;
  color: #666;
  padding: 0 16px 14px;
  text-transform: uppercase;
}
.story-btn {
  display: block;
  width: 100%;
  padding: 10px 16px;
  background: none;
  border: none;
  color: #aaa;
  font-size: 13px;
  text-align: left;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.2s;
}
.story-btn:hover { background: #222; color: #ddd; }
.story-btn.active { border-left-color: #c8a86e; color: #c8a86e; background: #222; }

#back {
  display: block;
  font-size: 10px;
  letter-spacing: 3px;
  color: #555;
  padding: 16px 16px 20px;
  text-decoration: none;
  border-bottom: 1px solid #2a2a2a;
  margin-bottom: 10px;
}
#back:hover { color: #999; }

/* PDF viewer */
#viewer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0d0d;
}
#viewer iframe {
  width: 100%;
  height: 100%;
  border: none;
}
#placeholder {
  text-align: center;
  color: #444;
  font-size: 13px;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div id="sidebar">
  <a id="back" href="https://birdbrain1991.github.io/1886menu/" target="_top">← BACK</a>
  <h2>Archive</h2>
  <div id="story-list">
    <!-- populated by JS -->
  </div>
</div>

<div id="viewer">
  <div id="placeholder">SELECT A STORY</div>
  <iframe id="pdf-frame" style="display:none;"></iframe>
</div>

<script>
const BASE = 'https://birdbrain1991.github.io/archive1886/';
const STORIES = ['Story1.pdf']; // add more as they become available

const list = document.getElementById('story-list');
const frame = document.getElementById('pdf-frame');
const placeholder = document.getElementById('placeholder');

STORIES.forEach((name, i) => {
  const btn = document.createElement('button');
  btn.className = 'story-btn';
  btn.textContent = 'Story ' + (i + 1);
  btn.onclick = () => {
    document.querySelectorAll('.story-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    placeholder.style.display = 'none';
    frame.style.display = 'block';
    frame.src = BASE + name;
  };
  list.appendChild(btn);
});
</script>
</body>
</html>
