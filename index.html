<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive 1886</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0e0a}
canvas#bg{position:fixed;inset:0;z-index:0}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:15;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;z-index:20;background:rgba(10,9,14,0.88);border-right:1px solid rgba(200,168,110,0.18);display:flex;flex-direction:column;backdrop-filter:blur(4px);}
#back{display:block;font-family:"IM Fell English",serif;font-size:11px;letter-spacing:3px;color:rgba(200,168,110,0.5);padding:18px 18px 14px;text-decoration:none;border-bottom:1px solid rgba(200,168,110,0.12);transition:color 0.3s;}
#back:hover{color:#c8a86e}
#sidebar h2{font-family:"IM Fell English",serif;font-size:10px;letter-spacing:4px;color:rgba(200,168,110,0.35);padding:14px 18px 10px;text-transform:uppercase;}
#story-list{flex:1;overflow-y:auto;padding:4px 0;}
.story-btn{display:block;width:100%;padding:11px 18px;background:none;border:none;border-left:3px solid transparent;color:rgba(200,168,110,0.5);font-family:"IM Fell English",serif;font-size:13px;text-align:left;cursor:pointer;transition:all 0.25s;}
.story-btn:hover{background:rgba(200,168,110,0.06);color:#c8a86e;}
.story-btn.active{border-left-color:#c8a86e;color:#c8a86e;background:rgba(200,168,110,0.08);}
#viewer{position:fixed;left:220px;top:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;justify-content:center;}
#placeholder{font-family:"IM Fell English",serif;font-size:12px;letter-spacing:4px;color:rgba(200,168,110,0.25);text-align:center;}
#pdf-frame{width:100%;height:100%;border:none;display:none;}
#loader{position:fixed;inset:0;background:#0d0e0a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;}
#loader.hidden{opacity:0;pointer-events:none;}
.loader-text{font-family:"IM Fell English",serif;font-size:11px;letter-spacing:5px;color:rgba(200,168,110,0.6);animation:lpulse 1.4s ease-in-out infinite;}
.loader-bar{width:160px;height:1px;background:rgba(200,168,110,0.15);margin-top:18px;position:relative;overflow:hidden;}
.loader-bar::after{content:'';position:absolute;left:-60%;top:0;width:60%;height:100%;background:#c8a86e;animation:lslide 1.2s ease-in-out infinite;}
@keyframes lpulse{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes lslide{0%{left:-60%}100%{left:110%}}
</style>
</head>
<body>
<div id="loader"><div class="loader-text">LOADING</div><div class="loader-bar"></div></div>
<canvas id="bg"></canvas>
<div id="scanlines"></div>
<div id="sidebar">
  <a id="back" href="https://birdbrain1991.github.io/1886menu/" target="_top">&#8592; back</a>
  <h2>Archive</h2>
  <div id="story-list"></div>
</div>
<div id="viewer">
  <iframe id="pdf-frame"></iframe>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var _hl = function() {
  var l = document.getElementById('loader');
  if (!l || l._gone) return;
  l._gone = true; l.classList.add('hidden');
  setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 900);
};
setTimeout(_hl, 3500);
window.addEventListener('pageshow', function() {
  document.fonts.ready.then(function() {
    requestAnimationFrame(function() { requestAnimationFrame(function() { _hl(); }); });
  });
  window.addEventListener('load', function() { setTimeout(_hl, 300); }, { once: true });
});

var BASE = 'https://birdbrain1991.github.io/archive1886/';

// x = West/East on map, z = North/South (negative z = further north/up on map)
// Innere Stadt center ~x=-11.5, z=0.7 | Nussdorf far north of map | Klosterneuburg even further
var STORIES = [
  { file: 'Story1-Important_Notice.pdf',         location: null },
  { file: 'Story2-Prologue_The_Nachtrapp.pdf',   location: { x: -11.0, z: -1.0, label: null } },
  { file: 'Story3-A_Whole_Bloody_Affair.pdf',    locations: [ { x: -17.7, z: -18.9, label: 'Nussdorf' }, { x: -18.7, z: -44.9, label: 'Klosterneuburg' } ] }
];

var list = document.getElementById('story-list');
var frame = document.getElementById('pdf-frame');
var ph = document.getElementById('placeholder');

// ── LIGHT BEAM system ──
var activeBeams = [];
var activeLabels = [];
var activeBeam = null;
var activeLabel = null;

function removeBeam() {
  activeBeams.forEach(function(b) { sc.remove(b); });
  activeLabels.forEach(function(l) { sc.remove(l); });
  activeBeams = []; activeLabels = [];
  activeBeam = null; activeLabel = null;
}

function spawnOneBeam(loc) {
  var beamGroup = new THREE.Group();
  beamGroup.position.set(loc.x, 0, loc.z);

  var beamGeo = new THREE.CylinderGeometry(0.18, 0.6, 30, 12, 1, true);
  var beamMat = new THREE.MeshBasicMaterial({
    color: 0xd4a840, transparent: true, opacity: 0.15,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
  });
  var beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.y = 15; beamGroup.add(beam);

  var coreGeo = new THREE.CylinderGeometry(0.05, 0.16, 30, 8, 1, true);
  var coreMat = new THREE.MeshBasicMaterial({
    color: 0xffe8a0, transparent: true, opacity: 0.55,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
  });
  var core = new THREE.Mesh(coreGeo, coreMat);
  core.position.y = 15; beamGroup.add(core);

  var ringGeo = new THREE.RingGeometry(0.3, 1.6, 24);
  var ringMat = new THREE.MeshBasicMaterial({
    color: 0xd4a840, transparent: true, opacity: 0.4,
    side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
  });
  var ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 2.5; beamGroup.add(ring);

  sc.add(beamGroup);
  activeBeams.push(beamGroup);

  if (loc.label) {
    var lc = document.createElement('canvas');
    lc.width = 1024; lc.height = 200;
    var lctx = lc.getContext('2d');
    lctx.clearRect(0, 0, 1024, 200);
    lctx.font = 'bold 144px "IM Fell English", Georgia, serif';
    lctx.textAlign = 'left';
    lctx.textBaseline = 'middle';
    lctx.fillStyle = 'rgba(255, 220, 120, 1.0)';
    lctx.fillText(loc.label, 40, 100);
    var ltex = new THREE.CanvasTexture(lc);
    ltex.minFilter = THREE.LinearFilter;
    ltex.magFilter = THREE.LinearFilter;
    var lmat = new THREE.MeshBasicMaterial({
      map: ltex, transparent: true, depthWrite: false,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending
    });
    var lmesh = new THREE.Mesh(new THREE.PlaneGeometry(14, 2.5), lmat);
    lmesh.rotation.y = 0;
    lmesh.position.set(loc.x + 8, 7, loc.z);
    sc.add(lmesh);
    activeLabels.push(lmesh);
  }
}

function spawnBeam(story) {
  removeBeam();
  var locs = story ? (story.locations || (story.location ? [story.location] : [])) : [];
  locs.forEach(function(loc) { spawnOneBeam(loc); });
  activeBeam = activeBeams[0] || null;
}
window._beamPulse = function(t) {
  activeBeams.forEach(function(activeBeam, bi) {
    var offset = bi * 0.8; // slight phase offset between beams
    activeBeam.children.forEach(function(c, idx) {
      if (!c.material || c.material.opacity === undefined) return;
      if (idx === 0) c.material.opacity = 0.12 + Math.sin(t * 2.0 + offset) * 0.05;
      if (idx === 1) c.material.opacity = 0.45 + Math.sin(t * 2.4 + offset) * 0.10;
      if (idx === 2) c.material.opacity = 0.30 + Math.sin(t * 1.6 + offset) * 0.10;
    });
  });
  if (activeBeams.length === 0) {
  }
  // Pulse nussdorf outline in sync with beam
  if (nussdorfLines && nussdorfLines.length && nussdorfLines[0].material.opacity > 0) {
    nussdorfLines[0].material.opacity = 0.18 + Math.sin(t * 2.0) * 0.06;
    nussdorfLines[1].material.opacity = 0.50 + Math.sin(t * 2.4) * 0.10;
    nussdorfLines[2].material.opacity = 0.30 + Math.sin(t * 1.6) * 0.08;
  }
};

STORIES.forEach(function(story, i) {
  var btn = document.createElement('button');
  btn.className = 'story-btn';
  var title = story.file.replace(/^[^-]+-/, '').replace(/\.pdf$/i, '').replace(/_/g, ' ');
  btn.textContent = title;
  btn.onmouseenter = (function(st, idx) {
    return function() {
      spawnBeam(st);
      if (window._showNussdorf) window._showNussdorf(idx === 2);
      if (window._showKlosterneuburg) window._showKlosterneuburg(idx === 2);
      var locs = st ? (st.locations || (st.location ? [st.location] : [])) : [];
      if (!locs.length) return;

      if (locs.length > 1) {
        // Bounding box of all locations → zoom out to fit both
        var minX = Math.min.apply(null, locs.map(function(l){return l.x;}));
        var maxX = Math.max.apply(null, locs.map(function(l){return l.x;}));
        var minZ = Math.min.apply(null, locs.map(function(l){return l.z;}));
        var maxZ = Math.max.apply(null, locs.map(function(l){return l.z;}));
        var cx = (minX + maxX) / 2;
        var cz = (minZ + maxZ) / 2;
        var span = Math.max(maxX - minX, Math.abs(maxZ - minZ));
        camAnimateTo(
          { x: cx + 2, y: 80 + span * 1.1, z: cz + 45 + span * 0.7 },
          { x: cx,     y: 0,               z: cz }
        );
        // Pendulum after initial zoom settles
        clearTimeout(window._pendulumTimer);
        window._pendulumLocs = locs;
        window._pendulumIdx = 0;
        function pendulumStep() {
          if (!window._pendulumLocs) return;
          var loc = window._pendulumLocs[window._pendulumIdx];
          camAnimateTo(
            { x: loc.x + 2, y: 58, z: loc.z + 30 },
            { x: loc.x,     y: 0,  z: loc.z }
          );
          window._pendulumIdx = (window._pendulumIdx + 1) % window._pendulumLocs.length;
          window._pendulumTimer = setTimeout(pendulumStep, 2200);
        }
        window._pendulumTimer = setTimeout(pendulumStep, 400);
      } else {
        var loc = locs[0];
        if (loc.z <= -10) {
          camAnimateTo(
            { x: loc.x + 2, y: 58, z: loc.z + 32 },
            { x: loc.x,     y: 0,  z: loc.z }
          );
        } else {
          camAnimateTo(
            { x: loc.x + 2, y: 40, z: loc.z + 18 },
            { x: loc.x,     y: 0,  z: loc.z }
          );
        }
      }
    };
  })(story, i);
  btn.onmouseleave = function() {
    removeBeam();
    if (window._showNussdorf) window._showNussdorf(false);
    if (window._showKlosterneuburg) window._showKlosterneuburg(false);
    // Cancel pendulum
    clearTimeout(window._pendulumTimer);
    window._pendulumLocs = null;
    camHome();
  };
  btn.onclick = function() {
    document.querySelectorAll('.story-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    window.open(BASE + story.file, '_blank');
  };
  list.appendChild(btn);
});

try {
  var cvs = document.getElementById('bg');
  var rdr = new THREE.WebGLRenderer({ canvas: cvs, antialias: false });
  rdr.setPixelRatio(1);
  rdr.setSize(window.innerWidth, window.innerHeight);
  rdr.toneMapping = THREE.ACESFilmicToneMapping;
  rdr.toneMappingExposure = 0.9;

  var sc = new THREE.Scene();
  sc.background = new THREE.Color(0x0d0e0a);
  sc.fog = new THREE.FogExp2(0x0d0e0a, 0.010);

  var cam = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.5, 400);
  cam.position.set(-8, 55, 25);
  cam.lookAt(-8, 0, 3);

  // ── CAMERA ANIMATION state ──
  var camAnim = {
    active: false,
    t: 0,
    duration: 1.2,
    fromPos: { x: -8, y: 55, z: 25 },
    toPos:   { x: -8, y: 55, z: 25 },
    fromLook: { x: -8, y: 0, z: 3 },
    toLook:   { x: -8, y: 0, z: 3 }
  };
  var CAM_HOME_POS  = { x: -8,  y: 55, z: 25 };
  var CAM_HOME_LOOK = { x: -8,  y: 0,  z: 3  };

  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function camAnimateTo(toPos, toLook) {
    camAnim.fromPos  = { x: cam.position.x, y: cam.position.y, z: cam.position.z };
    camAnim.fromLook = { x: cam._lookX || CAM_HOME_LOOK.x, y: 0, z: cam._lookZ || CAM_HOME_LOOK.z };
    camAnim.toPos    = toPos;
    camAnim.toLook   = toLook;
    camAnim.t        = 0;
    camAnim.active   = true;
  }

  function camHome() {
    camAnimateTo(CAM_HOME_POS, CAM_HOME_LOOK);
  }

  window._camTick = function(dt) {
    if (!camAnim.active) return;
    camAnim.t += dt / camAnim.duration;
    if (camAnim.t >= 1) { camAnim.t = 1; camAnim.active = false; }
    var e = easeInOut(camAnim.t);
    cam.position.x = camAnim.fromPos.x + (camAnim.toPos.x - camAnim.fromPos.x) * e;
    cam.position.y = camAnim.fromPos.y + (camAnim.toPos.y - camAnim.fromPos.y) * e;
    cam.position.z = camAnim.fromPos.z + (camAnim.toPos.z - camAnim.fromPos.z) * e;
    var lx = camAnim.fromLook.x + (camAnim.toLook.x - camAnim.fromLook.x) * e;
    var lz = camAnim.fromLook.z + (camAnim.toLook.z - camAnim.fromLook.z) * e;
    cam._lookX = lx; cam._lookZ = lz;
    cam.lookAt(lx, 0, lz);
  };

  window.addEventListener('resize', function() {
    cam.aspect = window.innerWidth / window.innerHeight;
    cam.updateProjectionMatrix();
    rdr.setSize(window.innerWidth, window.innerHeight);
  });

  sc.add(new THREE.AmbientLight(0x2a2418, 2.0));
  var moon = new THREE.DirectionalLight(0xd8c8a0, 1.6);
  moon.position.set(-25, 50, 20);
  sc.add(moon);
  var fill = new THREE.DirectionalLight(0x181828, 0.4);
  fill.position.set(20, 15, -10);
  sc.add(fill);

  // Ground
  var grd = new THREE.Mesh(new THREE.PlaneGeometry(220, 220), new THREE.MeshLambertMaterial({ color: 0x100e08 }));
  grd.rotation.x = -Math.PI / 2;
  sc.add(grd);

  function makeDistrict(pts, h, col, em) {
    var shape = new THREE.Shape();
    shape.moveTo(pts[0][0], pts[0][1]);
    for (var i = 1; i < pts.length; i++) shape.lineTo(pts[i][0], pts[i][1]);
    shape.closePath();
    var geo = new THREE.ExtrudeGeometry(shape, { depth: h, bevelEnabled: true, bevelThickness: 0.12, bevelSize: 0.1, bevelSegments: 2 });
    var mat = new THREE.MeshLambertMaterial({ color: col, emissive: em || 0x000000 });
    var mesh = new THREE.Mesh(geo, mat);
    var pivot = new THREE.Object3D();
    pivot.rotation.x = -Math.PI / 2;
    pivot.position.y = 0.05;
    pivot.add(mesh);
    sc.add(pivot);
    // Top edge glow
    var ep = pts.map(function(p) { return new THREE.Vector3(p[0], h + 0.22, -p[1]); });
    ep.push(ep[0].clone());
    var eg = new THREE.BufferGeometry().setFromPoints(ep);
    sc.add(new THREE.Line(eg, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.5 })));
  }


  // ── DISTRICTS — traced from image reference ──

  // Leopoldstadt (II) — large yellow district, diagonal strip NE
  makeDistrict([[-16.0, 17.1],[-7.8, 1.7],[-1.3, 3.7],[20.3,-16.4],[23.6,-11.2],[-6.3, 24.7]], 4.4, 0x2e3828, 0x0a1410);



  // Alsergrund (IX) — green, NW
  makeDistrict([[-16.6, 14.6],[-18.9, 12.1],[-17.8, 8.8],[-21.2, 6.6],[-20.1, 3.6],[-12.2, 5.6]], 1.8, 0x2e2a1e, 0x0a0806);

  // Innere Stadt (I) — blue, center
  makeDistrict([[-10.9, 4.6],[-16.0, 2.7],[-15.9,-1.1],[-12.3,-4.7],[-11.0,-3.3],[-9.5,-4.2],[-6.2, 0.6],[-10.0, 0.8]], 4.5, 0x6e5a3c, 0x1a1006);



  // Landstrasse (III) — 4 Punkte aus Screenshot
  makeDistrict([[-7.5,-5.5],[-2.0, 2.0],[15.0,-13.5],[0.0,-20.5]], 1.85, 0x3e3018, 0x100c04);

  // Wieden (IV) — red, south
  makeDistrict([[-22.9,-15.3],[-18.4,-21.7],[-14.8,-16.7],[-8.1,-20.3],[-8.7,-23.1],[-5.0,-25.1],[-2.0,-21.6],[-9.5,-6.6],[-12.7,-6.3]], 2.0, 0x5a3020, 0x140a06);

  // Josefstadt (VIII) — brown, small NW
  makeDistrict([[-22.8, 3.1],[-22.7,-0.5],[-17.2,-1.1],[-17.4, 2.6]], 1.9, 0x342c1e, 0x0c0a06);

  // Mariahilf (VI) — pink, small W
  makeDistrict([[-23.3,-2.0],[-21.9,-6.7],[-15.3,-3.8],[-16.6,-2.6]], 1.9, 0x4a3828, 0x120e08);

  // Neubau (VII) — orange, W strip
  makeDistrict([[-14.1,-5.2],[-23.5,-9.2],[-22.2,-10.9],[-17.8,-9.9],[-18.2,-7.8]], 2.0, 0x3a3020, 0x0e0c08);

  // Street texture overlay removed

  // ── STEPHANSDOM — Innere Stadt center (0.7,-7.4) ──
  var cathG = new THREE.Group();
  cathG.position.set(-11.5, 4.7, 0.7);

  // Nave
  var nave = new THREE.Mesh(new THREE.BoxGeometry(1.6,1.0,0.55),
    new THREE.MeshLambertMaterial({color:0x5a4a32,emissive:0x0c0a06}));
  nave.position.y = 0.5;
  cathG.add(nave);

  // Transept
  var trans = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.9,1.2),
    new THREE.MeshLambertMaterial({color:0x5a4a32,emissive:0x0c0a06}));
  trans.position.set(-0.25,0.45,0);
  cathG.add(trans);

  // South tower (tall)
  var st = new THREE.Mesh(new THREE.BoxGeometry(0.24,3.4,0.24),
    new THREE.MeshLambertMaterial({color:0x6e5a3c,emissive:0x100c04}));
  st.position.set(-0.68,1.7,0.15);
  cathG.add(st);
  var stSpire = new THREE.Mesh(new THREE.ConeGeometry(0.15,1.6,4),
    new THREE.MeshLambertMaterial({color:0x7a4e2a}));
  stSpire.position.set(-0.68,3.4+0.8,0.15);
  cathG.add(stSpire);

  // North tower (shorter, unfinished)
  var nt = new THREE.Mesh(new THREE.BoxGeometry(0.22,2.0,0.22),
    new THREE.MeshLambertMaterial({color:0x6e5a3c,emissive:0x100c04}));
  nt.position.set(-0.68,1.0,-0.15);
  cathG.add(nt);
  var ntCap = new THREE.Mesh(new THREE.BoxGeometry(0.28,0.1,0.28),
    new THREE.MeshLambertMaterial({color:0x8a7040}));
  ntCap.position.set(-0.68,2.05,-0.15);
  cathG.add(ntCap);

  // Steep roof
  var rvShape = new THREE.Shape();
  rvShape.moveTo(-0.8,-0.28); rvShape.lineTo(0.8,-0.28);
  rvShape.lineTo(0.8,0.28); rvShape.lineTo(-0.8,0.28); rvShape.closePath();
  var rvGeo = new THREE.ExtrudeGeometry(rvShape,{depth:0.5,bevelEnabled:false});
  var rvMesh = new THREE.Mesh(rvGeo,
    new THREE.MeshLambertMaterial({color:0x2e3828,emissive:0x0a1410,side:THREE.DoubleSide}));
  var rvPivot = new THREE.Object3D();
  rvPivot.rotation.x = -Math.PI/2;
  rvPivot.position.set(0,1.05,0.25);
  rvPivot.add(rvMesh);
  cathG.add(rvPivot);

  // Warm glow
  var cathGlow = new THREE.PointLight(0xd4a040,1.0,3.0);
  cathGlow.position.set(0,0.8,0);
  cathG.add(cathGlow);

  sc.add(cathG);

  // ── NUSSDORF glowing wireframe — Vorort außerhalb der 1850er Grenzen ──
  // Nördlich des Alsergrund, erst 1892 eingemeindet (19. Bezirk Döbling)
  var nussdorfLines = [];
  (function() {
    var pts = [
      [-20.0, 16.5],   // SW - Heiligenstädter Str./Grinzingerstr.
      [-21.0, 18.5],   // W  - Grinzingerstr.
      [-20.0, 21.5],   // NW - Kahlenbergerdorf-Grenze
      [-11.9, 21.5],   // N  - Donaukanal Westseite (Leo-NW x=-10.4 minus 1.5)
      [-15.1, 19.0],   // NE - Donaukanal Westseite (Leo-NW x=-13.6 minus 1.5)
      [-18.3, 16.5],   // SE - Heiligenstädter Str./Donaukanal
    ];

    // Build 3 line layers: outer glow (wide+dim), mid, bright core
    // Each is a closed polygon slightly above ground
    var layers = [
      { y: 2.65, color: 0xd4a840, opacity: 0.0, _base: 0.22 },  // outer warm glow
      { y: 2.75, color: 0xffd870, opacity: 0.0, _base: 0.55 },  // bright core
      { y: 2.85, color: 0xffe8a0, opacity: 0.0, _base: 0.35 },  // top shimmer
    ];

    layers.forEach(function(layer) {
      var verts = pts.map(function(p) { return new THREE.Vector3(p[0], layer.y, -p[1]); });
      verts.push(verts[0].clone());
      var geo = new THREE.BufferGeometry().setFromPoints(verts);
      var mat = new THREE.LineBasicMaterial({
        color: layer.color,
        transparent: true,
        opacity: 0.0,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      mat._base = layer._base;
      var line = new THREE.Line(geo, mat);
      sc.add(line);
      nussdorfLines.push(line);
    });
  })();

  // ── KLOSTERNEUBURG — permanenter Wireframe (gleicher Stil wie Nussdorf) ──
  (function() {
    var pts = [
      [-23.7, 40.4],  // SW — Wienerwald
      [-24.7, 44.9],  // W
      [-23.2, 49.9],  // NW
      [-17.2, 50.4],  // N
      [-14.7, 46.9],  // NE — Donauseite
      [-15.2, 40.4],  // SE — Grenze zu Wien/Nussdorf
    ];
    var layers = [
      { y: 2.65, color: 0xd4a840, opacity: 0.0, _base: 0.22 },
      { y: 2.75, color: 0xffd870, opacity: 0.0, _base: 0.55 },
      { y: 2.85, color: 0xffe8a0, opacity: 0.0, _base: 0.35 },
    ];
    var klosLines = [];
    layers.forEach(function(layer) {
      var verts = pts.map(function(p) { return new THREE.Vector3(p[0], layer.y, -p[1]); });
      verts.push(verts[0].clone());
      var geo = new THREE.BufferGeometry().setFromPoints(verts);
      var mat = new THREE.LineBasicMaterial({
        color: layer.color, transparent: true, opacity: 0.0,
        depthWrite: false, blending: THREE.AdditiveBlending
      });
      mat._base = layer._base;
      var line = new THREE.Line(geo, mat);
      sc.add(line);
      klosLines.push(line);
    });
    window._showKlosterneuburg = function(visible) {
      klosLines.forEach(function(l) {
        l.material.opacity = visible ? l.material._base : 0.0;
      });
    };
  })();

  window._showNussdorf = function(visible) {
    nussdorfLines.forEach(function(l) {
      l.material.opacity = visible ? l.material._base : 0.0;
    });
  };

  // ── DONAU / DANUBE — permanent glowing blue river band ──
  // Flows from Nussdorf NW (x=-14,z=20) diagonally SE past Leopoldstadt to exit map NE
  // Approximated as wide glowing line with multiple layers like the beam
  (function() {
    // River path points [x, z] — follows the Danube roughly from Nussdorf NE corner
    // through the map edge. z-axis is inverted in Three.js (negative z = north on map)
    // Donau 1850 — 3D Koordinaten (direkt, nicht pts-System):
    // 3D_z negativ = Bildschirm-NORDEN (oben), positiv = Bildschirm-SÜDEN (unten)
    // Leopoldstadt NW-Ecke (größtes pts[1]=24.7) → 3D: x=-6.3, z=-24.7
    // Donau fließt nordöstlich davon: startet Nussdorf (x=-12,z=-24),
    // biegt nach Osten, dann SE entlang rechtem Rand, aus Karte raus
    // Donau 1850: von Nussdorf/Brigittaspitz (NW), Bogen nach O-NE,
    // läuft nordöstlich der Donauinsel (Brigittenau) dann SE an rechtem Rand raus
    // PLUS schmaler Arm zwischen Mainland-Leopoldstadt und Donauinsel (Donaukanal Nord)
    var riverPts = [
      new THREE.Vector3(-12.0, 2.6, -24.0),  // Nussdorf Einlauf
      new THREE.Vector3(  2.0, 2.6, -35.0),  // Bogen nach O, nördlich der Insel
      new THREE.Vector3( 22.0, 2.6, -34.0),  // NE der Insel (Brigittaspitz)
      new THREE.Vector3( 30.0, 2.6, -26.0),  // biegt SE
      new THREE.Vector3( 33.0, 2.6, -12.0),  // rechter Kartenrand
      new THREE.Vector3( 30.0, 2.6,   4.0)   // Praterspitz
    ];

    // Donaukanal-Arm: verbindet Mainland-NW mit Donauinsel-S (schmaler Arm)
    // Mainland NW-Ecke: pts[-16,17.1] → 3D(-16,-17.1), pts[-6.3,24.7] → 3D(-6.3,-24.7)
    // Insel SW: ungefähr 3D(-14,-17.5) bis 3D(-6,-17.5)
    var innerArmPts = [
      new THREE.Vector3( -6.3, 2.6, -24.7),  // Mainland Leopoldstadt NW-Ecke
      new THREE.Vector3( -7.0, 2.6, -26.0),  // schmaler Spalt zur Insel SW
      new THREE.Vector3( 18.0, 2.6, -26.0),  // entlang Südkante der Insel
      new THREE.Vector3( 22.0, 2.6, -31.0),  // mündet in Donau bei Brigittaspitz NE
    ];
    var innerLayers = [
      { width: 3.5, color: 0x0830a0, opacity: 0.12 },
      { width: 2.0, color: 0x1850d0, opacity: 0.28 },
      { width: 0.8, color: 0x60a0ff, opacity: 0.45 },
    ];
    innerLayers.forEach(function(layer) {
      var hw = layer.width / 2;
      var positions2 = [], indices2 = [];
      for (var ii = 0; ii < innerArmPts.length; ii++) {
        var pp = innerArmPts[ii];
        var dir2;
        if (ii === 0) dir2 = new THREE.Vector3().subVectors(innerArmPts[1], innerArmPts[0]).normalize();
        else if (ii === innerArmPts.length-1) dir2 = new THREE.Vector3().subVectors(innerArmPts[ii], innerArmPts[ii-1]).normalize();
        else dir2 = new THREE.Vector3().subVectors(innerArmPts[ii+1], innerArmPts[ii-1]).normalize();
        var perp2 = new THREE.Vector3(-dir2.z, 0, dir2.x).normalize();
        positions2.push(pp.x+perp2.x*hw, pp.y, pp.z+perp2.z*hw, pp.x-perp2.x*hw, pp.y, pp.z-perp2.z*hw);
        if (ii < innerArmPts.length-1) { var b2=ii*2; indices2.push(b2,b2+1,b2+2,b2+1,b2+3,b2+2); }
      }
      var rg2 = new THREE.BufferGeometry();
      rg2.setAttribute('position', new THREE.Float32BufferAttribute(positions2,3));
      rg2.setIndex(indices2);
      sc.add(new THREE.Mesh(rg2, new THREE.MeshBasicMaterial({color:layer.color,transparent:true,opacity:layer.opacity,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending})));
    });

    // Three layers: wide outer glow, mid, bright core
    var riverLayers = [
      { width: 7.0, color: 0x0830a0, opacity: 0.14 },  // outer glow — wide unregulated Donau
      { width: 4.0, color: 0x1850d0, opacity: 0.32 },  // main body
      { width: 1.8, color: 0x60a0ff, opacity: 0.55 },  // bright core channel
    ];

    riverLayers.forEach(function(layer) {
      var geo = new THREE.BufferGeometry().setFromPoints(riverPts);
      // Use linewidth via material — won't be >1 in WebGL, so we stack planes instead
      // Build a ribbon mesh along the path
      var positions = [];
      var indices = [];
      var hw = layer.width / 2;
      for (var i = 0; i < riverPts.length; i++) {
        var p = riverPts[i];
        // Direction vector along river
        var dir;
        if (i === 0) {
          dir = new THREE.Vector3().subVectors(riverPts[1], riverPts[0]).normalize();
        } else if (i === riverPts.length - 1) {
          dir = new THREE.Vector3().subVectors(riverPts[i], riverPts[i-1]).normalize();
        } else {
          dir = new THREE.Vector3().subVectors(riverPts[i+1], riverPts[i-1]).normalize();
        }
        // Perpendicular in XZ plane
        var perp = new THREE.Vector3(-dir.z, 0, dir.x).normalize();
        positions.push(
          p.x + perp.x * hw, p.y, p.z + perp.z * hw,
          p.x - perp.x * hw, p.y, p.z - perp.z * hw
        );
        if (i < riverPts.length - 1) {
          var base = i * 2;
          indices.push(base, base+1, base+2, base+1, base+3, base+2);
        }
      }
      var ribbonGeo = new THREE.BufferGeometry();
      ribbonGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      ribbonGeo.setIndex(indices);
      var mat = new THREE.MeshBasicMaterial({
        color: layer.color,
        transparent: true,
        opacity: layer.opacity,
        side: THREE.DoubleSide,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      sc.add(new THREE.Mesh(ribbonGeo, mat));
    });

    // Danube label — flat on ground, same style as Vienna Austria label
    var lc = document.createElement('canvas');
    lc.width = 512; lc.height = 96;
    var lctx = lc.getContext('2d');
    lctx.clearRect(0, 0, 512, 96);
    lctx.font = 'italic bold 56px Georgia, serif';
    lctx.textAlign = 'left';
    lctx.textBaseline = 'middle';
    lctx.fillStyle = 'rgba(100, 180, 255, 1.0)';
    lctx.fillText('Donau / Danube', 10, 48);
    var ltex = new THREE.CanvasTexture(lc);
    ltex.minFilter = THREE.LinearFilter;
    var lmat = new THREE.MeshBasicMaterial({
      map: ltex, transparent: true, depthWrite: false,
      side: THREE.DoubleSide, blending: THREE.AdditiveBlending
    });
    var lmesh = new THREE.Mesh(new THREE.PlaneGeometry(9, 1.8), lmat);
    lmesh.rotation.x = -Math.PI / 2;
    lmesh.rotation.z = -1.3; // angle: mostly N-S along right edge
    lmesh.position.set(32.0, 2.7, -22.0); // rechter Rand oben, über Textur
    sc.add(lmesh);
  })();

  // ── DONAUINSEL (Brigittenau) — permanenter Wireframe ──
  // Zwischen Donaukanal (SW) und Donau-Hauptarm (NE), nördlich der Mainland-Leopoldstadt
  // pts-Koordinaten [x, z_map] wie makeDistrict
  (function() {
    var islandPts = [
      [ -8.0, 26.0],  // SW — nördlich der Mainland-Leopoldstadt NW-Ecke (pts[1]=24.7)
      [ 18.0, 26.0],  // SE
      [ 22.0, 31.0],  // NE — Brigittaspitz Ost
      [  8.0, 34.0],  // N
      [ -6.0, 32.0],  // NW — Brigittaspitz West (Donaukanal-Abzweigung)
    ];
    // Top-edge glow verwendet Vector3(p[0], h, -p[1]) — gleich wie makeDistrict
    var islandLayers = [
      { y: 2.65, color: 0x2860c0, _base: 0.20 },  // blau-grün wie Wasser
      { y: 2.75, color: 0x4090e0, _base: 0.50 },
      { y: 2.85, color: 0x80c0ff, _base: 0.30 },
    ];
    islandLayers.forEach(function(layer) {
      var verts = islandPts.map(function(p) { return new THREE.Vector3(p[0], layer.y, -p[1]); });
      verts.push(verts[0].clone());
      var geo = new THREE.BufferGeometry().setFromPoints(verts);
      var mat = new THREE.LineBasicMaterial({color:layer.color,transparent:true,opacity:layer._base,depthWrite:false,blending:THREE.AdditiveBlending});
      sc.add(new THREE.Line(geo, mat));
    });

    // Label — gleicher Stil wie Nussdorf-Label (aufrecht, AdditiveBlending)
    var lc = document.createElement('canvas');
    lc.width = 1024; lc.height = 200;
    var lctx = lc.getContext('2d');
    lctx.clearRect(0, 0, 1024, 200);
    lctx.font = 'bold 120px "IM Fell English", Georgia, serif';
    lctx.textAlign = 'left';
    lctx.textBaseline = 'middle';
    lctx.fillStyle = 'rgba(100, 180, 255, 1.0)';
    lctx.fillText('Donauinsel', 30, 100);
    var ltex = new THREE.CanvasTexture(lc);
    ltex.minFilter = THREE.LinearFilter;
    ltex.magFilter = THREE.LinearFilter;
    var lmat = new THREE.MeshBasicMaterial({map:ltex,transparent:true,depthWrite:false,side:THREE.DoubleSide,blending:THREE.AdditiveBlending});
    var lmesh = new THREE.Mesh(new THREE.PlaneGeometry(12, 2.2), lmat);
    lmesh.rotation.y = 0;
    lmesh.position.set(6.0, 8.0, -30.0); // über der Insel
    sc.add(lmesh);
  })();


  // ── EASTER EGG — click on Stephansdom ──
  var cathWorldPos = new THREE.Vector3();

  document.addEventListener('click', function(e) {
    // Project cathG world position to screen
    cathG.getWorldPosition(cathWorldPos);
    var projected = cathWorldPos.clone().project(cam);
    var sx = (projected.x + 1) / 2 * window.innerWidth;
    var sy = (1 - (projected.y + 1) / 2) * window.innerHeight;
    var dx = e.clientX - sx;
    var dy = e.clientY - sy;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 23) {
      window.open('https://birdbrain1991.github.io/1886easteregg/', '_blank');
    }
  });

  document.addEventListener('mousemove', function(e) {
    cathG.getWorldPosition(cathWorldPos);
    var projected = cathWorldPos.clone().project(cam);
    var sx = (projected.x + 1) / 2 * window.innerWidth;
    var sy = (1 - (projected.y + 1) / 2) * window.innerHeight;
    var dx = e.clientX - sx;
    var dy = e.clientY - sy;
    document.body.style.cursor = Math.sqrt(dx*dx + dy*dy) < 23 ? 'pointer' : 'default';
  });






  // ── MAP TITLE LABEL ──
  (function() {
    var canvas = document.createElement('canvas');
    canvas.width = 2048; canvas.height = 512;
    var ctx = canvas.getContext('2d');

    // Black background
    ctx.fillStyle = 'rgba(8,7,5,0.92)';
    ctx.fillRect(0, 0, 2048, 512);

    // Outer border
    ctx.strokeStyle = 'rgba(200,168,110,0.7)';
    ctx.lineWidth = 6;
    ctx.strokeRect(12, 12, 2024, 488);

    // Inner border
    ctx.strokeStyle = 'rgba(200,168,110,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(24, 24, 2000, 464);

    // Decorative line top
    ctx.strokeStyle = 'rgba(200,168,110,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(80,90); ctx.lineTo(1968,90); ctx.stroke();

    // Main title
    ctx.fillStyle = 'rgba(220,185,120,0.95)';
    ctx.font = 'italic 148px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Vienna, Austria', 1024, 210);

    // Year
    ctx.font = '118px Georgia, serif';
    ctx.fillStyle = 'rgba(220,185,120,0.95)';
    ctx.fillText('1886', 1024, 320);

    // Decorative line bottom
    ctx.strokeStyle = 'rgba(200,168,110,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(80,370); ctx.lineTo(1968,370); ctx.stroke();

    // Subtitle — italic, smaller
    ctx.font = 'italic 94px Georgia, serif';
    ctx.fillStyle = 'rgba(220,185,120,0.95)';
    ctx.fillText('well, kinda ... similar-ish', 1024, 455);

    var tex = new THREE.CanvasTexture(canvas);
    var mat = new THREE.MeshBasicMaterial({
      map: tex, transparent: true, depthWrite: false,
      side: THREE.DoubleSide
    });
    var mesh = new THREE.Mesh(new THREE.PlaneGeometry(17, 6), mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(-11.5, 5.5, 7.5);
    sc.add(mesh);
  })();

  // Stars
  var sGeo = new THREE.BufferGeometry();
  var sPos = [];
  for (var i = 0; i < 280; i++) sPos.push((Math.random()-.5)*300, 30+Math.random()*60, (Math.random()-.5)*300);
  sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
  sc.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xc8c0b0, size: 0.28, transparent: true, opacity: 0.55 })));

  // ── ZEPPELINS ──
  function makeZeppelin(sx, sy, sz, speed, bobFreq, bobAmp) {
    var g = new THREE.Group();
    // Hull
    var h = new THREE.Mesh(new THREE.SphereGeometry(1,16,8),
      new THREE.MeshLambertMaterial({color:0x8a7848, emissive:0x1a1408}));
    h.scale.set(4.5, 1, 1);
    g.add(h);
    // Tail fins
    var finMat = new THREE.MeshLambertMaterial({color:0x6a5c38, emissive:0x0e0c06});
    var finShape = new THREE.Shape();
    finShape.moveTo(0,0); finShape.lineTo(-1.5,0); finShape.lineTo(-1.2,0.8); finShape.closePath();
    var finGeo = new THREE.ShapeGeometry(finShape);
    var finTop = new THREE.Mesh(finGeo, finMat);
    finTop.position.set(-3.8, 0.9, 0); g.add(finTop);
    var finBot = new THREE.Mesh(finGeo, finMat);
    finBot.position.set(-3.8, -0.9, 0); finBot.scale.y = -1; g.add(finBot);
    var finR = new THREE.Mesh(finGeo, finMat);
    finR.position.set(-3.8, 0, 0.9); finR.rotation.y = Math.PI/2; g.add(finR);
    // Gondola
    var gond = new THREE.Mesh(new THREE.BoxGeometry(2.4,0.55,0.65),
      new THREE.MeshLambertMaterial({color:0x2e2214, emissive:0x080604}));
    gond.position.y = -1.15;
    g.add(gond);
    // Gondola windows
    var winMat = new THREE.MeshBasicMaterial({color:0xd4a840});
    for (var wi = -0.7; wi <= 0.7; wi += 0.35) {
      var win = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.66), winMat);
      win.position.set(wi, -1.05, 0); g.add(win);
    }
    // Rope lines (gondola to hull)
    var ropeMat = new THREE.LineBasicMaterial({color:0x5a4a28, transparent:true, opacity:0.6});
    [[-0.8,0.8],[0,0.8],[0.8,0.8]].forEach(function(rx) {
      var rpts = [new THREE.Vector3(rx[0],-0.95,0), new THREE.Vector3(rx[0],-1.12,0)];
      g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(rpts), ropeMat));
    });
    g.position.set(sx, sy, sz);
    g.userData = {speed: speed, bobFreq: bobFreq, bobAmp: bobAmp, baseY: sy};
    sc.add(g);
    return g;
  }

  // Three zeppelins at different heights, speeds, paths
  var zep1 = makeZeppelin(-35, 18, 2,   1.2, 0.22, 0.8);
  var zep2 = makeZeppelin(-20, 22, 8,   0.7, 0.17, 1.1);
  var zep3 = makeZeppelin(  5, 20, -5,  0.9, 0.28, 0.6);

  // ── CLOUDS ──
  function makeCloud(cx, cy, cz, scale) {
    var g = new THREE.Group();
    var cMat = new THREE.MeshLambertMaterial({
      color: 0xc8c0b0, transparent: true, opacity: 0.18, depthWrite: false
    });
    // Cluster of overlapping spheres
    var blobs = [
      [0,0,0,1.0], [1.4,0.3,0.2,0.8], [-1.3,0.2,-0.1,0.75],
      [0.5,0.7,0.5,0.7], [-0.4,0.6,-0.4,0.65], [0.9,-0.1,0.8,0.6]
    ];
    blobs.forEach(function(b) {
      var blob = new THREE.Mesh(new THREE.SphereGeometry(b[3]*scale, 8, 6), cMat.clone());
      blob.position.set(b[0]*scale, b[1]*scale, b[2]*scale);
      g.add(blob);
    });
    g.position.set(cx, cy, cz);
    g.userData = {baseY: cy, drift: (Math.random()-0.5)*0.04};
    sc.add(g);
    return g;
  }

  var cloud1 = makeCloud(-12, 24, 0,   4.5);
  var cloud2 = makeCloud(  5, 27, 6,   3.8);
  var cloud3 = makeCloud( -8, 25, -8,  5.0);

  var clk = new THREE.Clock();
  rdr.setAnimationLoop(function() {
    var dt = clk.getDelta();
    var t = clk.getElapsedTime();

    // Animate zeppelins
    [zep1, zep2, zep3].forEach(function(z) {
      z.position.x += z.userData.speed * dt;
      if (z.position.x > 60) z.position.x = -60;
      z.position.y = z.userData.baseY + Math.sin(t * z.userData.bobFreq) * z.userData.bobAmp;
    });

    // Drift clouds slowly
    [cloud1, cloud2, cloud3].forEach(function(c) {
      c.position.x += c.userData.drift * dt;
      c.position.y = c.userData.baseY + Math.sin(t * 0.08) * 0.4;
      if (c.position.x > 40) c.position.x = -40;
      if (c.position.x < -40) c.position.x = 40;
    });

    if (window._beamPulse) window._beamPulse(t);
    if (window._camTick) window._camTick(dt);
    rdr.render(sc, cam);
  });

} catch(e) { console.error('BG:', e); }
</script>
