<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive 1886</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0e0a}
canvas#bg{position:fixed;inset:0;z-index:0}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:15;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.07) 3px,rgba(0,0,0,0.07) 4px);}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;z-index:20;background:rgba(10,9,14,0.88);border-right:1px solid rgba(200,168,110,0.18);display:flex;flex-direction:column;backdrop-filter:blur(4px);}
#back{display:block;font-family:"IM Fell English",serif;font-size:11px;letter-spacing:3px;color:rgba(200,168,110,0.5);padding:18px 18px 14px;text-decoration:none;border-bottom:1px solid rgba(200,168,110,0.12);transition:color 0.3s;}
#back:hover{color:#c8a86e}
#sidebar h2{font-family:"IM Fell English",serif;font-size:10px;letter-spacing:4px;color:rgba(200,168,110,0.35);padding:14px 18px 10px;text-transform:uppercase;}
#story-list{flex:1;overflow-y:auto;padding:4px 0;}
.story-btn{display:block;width:100%;padding:11px 18px;background:none;border:none;border-left:3px solid transparent;color:rgba(200,168,110,0.5);font-family:"IM Fell English",serif;font-size:13px;text-align:left;cursor:pointer;transition:all 0.25s;}
.story-btn:hover{background:rgba(200,168,110,0.06);color:#c8a86e;}
.story-btn.active{border-left-color:#c8a86e;color:#c8a86e;background:rgba(200,168,110,0.08);}
#viewer{position:fixed;left:220px;top:0;right:0;bottom:0;z-index:20;display:flex;align-items:center;justify-content:center;}
#placeholder{font-family:"IM Fell English",serif;font-size:12px;letter-spacing:4px;color:rgba(200,168,110,0.25);text-align:center;}
#pdf-frame{width:100%;height:100%;border:none;display:none;}
#loader{position:fixed;inset:0;background:#0d0e0a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;}
#loader.hidden{opacity:0;pointer-events:none;}
.loader-text{font-family:"IM Fell English",serif;font-size:11px;letter-spacing:5px;color:rgba(200,168,110,0.6);animation:lpulse 1.4s ease-in-out infinite;}
.loader-bar{width:160px;height:1px;background:rgba(200,168,110,0.15);margin-top:18px;position:relative;overflow:hidden;}
.loader-bar::after{content:'';position:absolute;left:-60%;top:0;width:60%;height:100%;background:#c8a86e;animation:lslide 1.2s ease-in-out infinite;}
@keyframes lpulse{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes lslide{0%{left:-60%}100%{left:110%}}
</style>
</head>
<body>

<div id="loader"><div class="loader-text">LOADING</div><div class="loader-bar"></div></div>
<canvas id="bg"></canvas>
<div id="scanlines"></div>

<div id="sidebar">
  <a id="back" href="https://birdbrain1991.github.io/1886menu/" target="_top">&#8592; back</a>
  <h2>Archive</h2>
  <div id="story-list"></div>
</div>

<div id="viewer">
  <div id="placeholder">SELECT A STORY</div>
  <iframe id="pdf-frame"></iframe>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var _hl = function() {
  var l = document.getElementById('loader');
  if (!l || l._gone) return;
  l._gone = true;
  l.classList.add('hidden');
  setTimeout(function() { if (l.parentNode) l.parentNode.removeChild(l); }, 900);
};
setTimeout(_hl, 3000);
window.addEventListener('pageshow', function() {
  document.fonts.ready.then(function() {
    requestAnimationFrame(function() { requestAnimationFrame(function() { _hl(); }); });
  });
  window.addEventListener('load', function() { setTimeout(_hl, 200); }, { once: true });
});

var BASE = 'https://birdbrain1991.github.io/archive1886/';
var STORIES = ['Story1.pdf'];
var list = document.getElementById('story-list');
var frame = document.getElementById('pdf-frame');
var ph = document.getElementById('placeholder');
STORIES.forEach(function(name, i) {
  var btn = document.createElement('button');
  btn.className = 'story-btn';
  btn.textContent = 'Story ' + (i + 1);
  btn.onclick = function() {
    document.querySelectorAll('.story-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    ph.style.display = 'none';
    frame.style.display = 'block';
    frame.src = BASE + name;
  };
  list.appendChild(btn);
});

try {
  var cvs = document.getElementById('bg');
  var rdr = new THREE.WebGLRenderer({ canvas: cvs, antialias: false });
  rdr.setPixelRatio(1);
  rdr.setSize(window.innerWidth, window.innerHeight);
  rdr.toneMapping = THREE.ACESFilmicToneMapping;
  rdr.toneMappingExposure = 0.85;

  var sc = new THREE.Scene();
  sc.background = new THREE.Color(0x0d0e0a);
  sc.fog = new THREE.FogExp2(0x0d0e0a, 0.016);

  var cam = new THREE.PerspectiveCamera(44, window.innerWidth / window.innerHeight, 0.5, 300);
  cam.position.set(0, 55, 42);
  cam.lookAt(0, 0, -14);

  window.addEventListener('resize', function() {
    cam.aspect = window.innerWidth / window.innerHeight;
    cam.updateProjectionMatrix();
    rdr.setSize(window.innerWidth, window.innerHeight);
  });

  sc.add(new THREE.AmbientLight(0x2a2418, 2.2));
  var moon = new THREE.DirectionalLight(0xd8c8a0, 1.5);
  moon.position.set(-20, 40, 10);
  sc.add(moon);

  var mGrd = new THREE.MeshLambertMaterial({ color: 0x1c1c14 });
  var mStn = new THREE.MeshLambertMaterial({ color: 0x4a3c2c });
  var mStL = new THREE.MeshLambertMaterial({ color: 0x6e5a3c });
  var mRof = new THREE.MeshLambertMaterial({ color: 0x5a3020 });
  var mCop = new THREE.MeshLambertMaterial({ color: 0x1e3c30, emissive: 0x0a1e18 });
  var mWin = new THREE.MeshLambertMaterial({ color: 0xc89040, emissive: 0x8a5820 });
  var mRiv = new THREE.MeshLambertMaterial({ color: 0x1a2e3a, emissive: 0x081418 });
  var mSpr = new THREE.MeshLambertMaterial({ color: 0x7a4e2a });

  var grd = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), mGrd);
  grd.rotation.x = -Math.PI / 2;
  sc.add(grd);

  function makeRiver(pts, w) {
    var shape = new THREE.Shape();
    var n = pts.length;
    function perp(i) {
      var a = i > 0 ? pts[i-1] : pts[i];
      var b = i < n-1 ? pts[i+1] : pts[i];
      var dx = b[0]-a[0], dz = b[1]-a[1];
      var len = Math.sqrt(dx*dx+dz*dz) || 1;
      return [-dz/len*w/2, dx/len*w/2];
    }
    var left = [], right = [];
    pts.forEach(function(_, i) {
      var p = perp(i);
      left.push([pts[i][0]+p[0], pts[i][1]+p[1]]);
      right.push([pts[i][0]-p[0], pts[i][1]-p[1]]);
    });
    shape.moveTo(left[0][0], left[0][1]);
    left.forEach(function(p) { shape.lineTo(p[0], p[1]); });
    right.slice().reverse().forEach(function(p) { shape.lineTo(p[0], p[1]); });
    shape.closePath();
    var mesh = new THREE.Mesh(new THREE.ShapeGeometry(shape, 4), mRiv);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = 0.05;
    sc.add(mesh);
  }

  makeRiver([[22,-35],[26,-25],[30,-15],[32,-5],[34,5],[32,15],[28,22],[24,28]], 8);
  makeRiver([[14,-30],[18,-20],[22,-10],[24,0],[22,8]], 4);

  function mkBlock(x, z, w, d, h, style) {
    var g = new THREE.Group();
    g.position.set(x, 0, z);
    var body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mStn);
    body.position.y = h / 2;
    g.add(body);
    var cor = new THREE.Mesh(new THREE.BoxGeometry(w*1.04, h*0.05, d*1.04), mStL);
    cor.position.y = h + h*0.025;
    g.add(cor);
    if (style === 'dome') {
      var dome = new THREE.Mesh(new THREE.SphereGeometry(Math.min(w,d)*0.3, 8, 5, 0, Math.PI*2, 0, Math.PI/2), mCop);
      dome.position.y = h;
      g.add(dome);
    } else if (style === 'spire') {
      var sp = new THREE.Mesh(new THREE.ConeGeometry(Math.min(w,d)*0.18, h*0.5, 5), mSpr);
      sp.position.y = h + h*0.25;
      g.add(sp);
    } else {
      var rf = new THREE.Mesh(new THREE.BoxGeometry(w*1.02, h*0.08, d*1.02), mRof);
      rf.position.y = h + h*0.04;
      g.add(rf);
    }
    if (h > 2.5) {
      var cols = Math.max(1, Math.floor(w/1.4));
      var spc = w / (cols+1);
      for (var row = 0; row < Math.floor(h/1.5); row++) {
        for (var col = 0; col < cols; col++) {
          var win = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.28, 0.04), mWin);
          win.position.set(-w/2 + spc*(col+1), 1.0 + row*1.4, d/2 + 0.01);
          g.add(win);
        }
      }
    }
    sc.add(g);
  }

  [[-2,-6,4,3,3.5,'dome'],[-6,-4,3,3,3,'spire'],[2,-4,3,4,3.2,'roof'],
   [-4,-8,4,3,2.8,'roof'],[0,-10,3,3,3,'dome'],[4,-8,3,3,2.8,'roof'],
   [-8,-6,3,2,2.5,'roof'],[4,-4,2,3,2.6,'spire'],[-2,-2,5,3,3,'roof'],
   [0,-6,3,3,3.2,'dome'],[-6,-10,3,3,2.8,'roof'],[2,-12,4,3,2.8,'dome'],
   [-4,-4,3,2,2.6,'roof'],[2,-8,2,3,2.4,'spire'],[-6,-7,2,2,2.8,'roof'],
   [6,-6,3,2,2.5,'dome'],[-2,-14,3,3,2.6,'roof'],[4,-12,2,2,2.4,'spire']
  ].forEach(function(b) { mkBlock(b[0],b[1],b[2],b[3],b[4],b[5]); });

  [[-14,-4,4,3,2.5,'roof'],[-12,-10,3,3,2.2,'spire'],[-10,-16,4,3,2.4,'roof'],
   [-4,-18,3,4,2.5,'dome'],[4,-18,4,3,2.2,'roof'],[10,-14,3,3,2.4,'spire'],
   [12,-8,3,3,2.2,'roof'],[10,-2,4,3,2.5,'roof'],[6,2,3,3,2.3,'dome'],
   [-2,4,4,3,2.2,'roof'],[-10,2,3,3,2.4,'spire'],[-14,-14,3,3,2,'roof'],
   [2,-16,3,3,2.2,'roof'],[-8,4,3,2,2,'roof'],[14,-4,3,2,2,'roof'],
   [-16,-8,3,2,2,'roof'],[16,-10,3,3,2.2,'dome'],[-6,-20,3,2,2,'roof'],
   [8,-18,3,2,2.2,'spire'],[-12,0,3,3,2.2,'roof'],[14,0,3,2,2,'roof'],
   [0,-22,4,3,2.4,'dome'],[-18,-18,3,2,2,'roof'],[18,-16,3,2,2,'spire']
  ].forEach(function(b) { mkBlock(b[0],b[1],b[2],b[3],b[4],b[5]); });

  var sGeo = new THREE.BufferGeometry();
  var sPos = [];
  for (var i = 0; i < 250; i++) sPos.push((Math.random()-.5)*300, 25+Math.random()*60, (Math.random()-.5)*300);
  sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));
  sc.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xc8c0b0, size: 0.3, transparent: true, opacity: 0.6 })));

  var zepG = new THREE.Group();
  var hull = new THREE.Mesh(new THREE.SphereGeometry(1,12,6), new THREE.MeshLambertMaterial({ color: 0x8a7848 }));
  hull.scale.set(4, 1, 1);
  zepG.add(hull);
  var gond = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 0.7), new THREE.MeshLambertMaterial({ color: 0x3a2e1c }));
  gond.position.y = -1.1;
  zepG.add(gond);
  zepG.position.set(-40, 18, -8);
  sc.add(zepG);

  var clk = new THREE.Clock();
  rdr.setAnimationLoop(function() {
    var dt = clk.getDelta();
    zepG.position.x += 0.9 * dt;
    if (zepG.position.x > 50) zepG.position.x = -50;
    zepG.position.y = 18 + Math.sin(clk.getElapsedTime() * 0.25) * 0.6;
    rdr.render(sc, cam);
  });

} catch(e) { console.error('BG:', e); }
</script>
</body>
</html>
